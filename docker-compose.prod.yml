version: "3.9"

services:
  api:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  mongo:
    command: mongod --auth
    restart: unless-stopped
    ports: []

  redis:
    restart: unless-stopped
    ports: []

  client:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://your-domain.example.com
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - client
      - api
    ports:
      - "80:80"
